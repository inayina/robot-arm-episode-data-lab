name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate-and-test:
    name: Validate dataset and run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate standard sample episode
        run: |
          python scripts/collect_episode.py \
            --config configs/default.yaml \
            --output dataset_sample/episode_000001 \
            --num-steps 100 \
            --width 640 \
            --height 480

      - name: Validate sample episode
        run: python scripts/validate_dataset.py dataset_sample/episode_000001

      - name: Generate pick_and_lift sample episode
        run: |
          python scripts/collect_episode.py \
            --task pick_and_lift \
            --output dataset_sample/episode_pick_ci \
            --num-steps 40 \
            --width 64 \
            --height 48 \
            --seed 7

      - name: Validate pick_and_lift sample episode
        run: python scripts/validate_dataset.py dataset_sample/episode_pick_ci

      - name: Run pytest
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q

      - name: Verify generated docs
        run: python scripts/update_project_docs.py --check
